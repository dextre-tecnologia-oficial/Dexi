            <div class="flex items-center gap-1 text-[11px] bg-slate-700/60 px-1.5 py-0.5 rounded-md">
              <span class="text-slate-400">px:</span>
              <input type="number" min="1" max="50" value="4" oninput="setStrokeWidthCard(this.closest('.codex-card'), this.value)" class="w-7 bg-transparent text-center text-amber-400 font-bold font-mono focus:outline-none pointer-events-auto">
            </div>

            <input type="color" value="#1e293b" oninput="setColorCard(this.closest('.codex-card'), this.value)" class="w-6 h-6 ml-1 p-0 border-0 rounded bg-transparent cursor-pointer pointer-events-auto" title="Cor da Caneta">

            <div class="w-px h-3 bg-slate-600"></div>
            
            <button onclick="adicionarNovaPaginaAoCard(this.closest('.codex-card'))" class="text-indigo-400 hover:text-indigo-300 transition-colors font-bold text-[11px]" title="Adicionar outra folha">+📄</button>

            <div class="w-px h-3 bg-slate-600"></div>

            <button onclick="zoomCanvasCard(this.closest('.codex-card'), 0.15)" class="text-slate-300 hover:text-amber-300 transition-colors font-bold text-xs" title="Aumentar Zoom">➕</button>
            <button onclick="zoomCanvasCard(this.closest('.codex-card'), -0.15)" class="text-slate-300 hover:text-amber-300 transition-colors font-bold text-xs" title="Diminuir Zoom">➖</button>
            
            <div class="w-px h-3 bg-slate-600"></div>

            <button onclick="downloadCardAsMultiPagePDF(this.closest('.codex-card'))" class="text-slate-300 hover:text-emerald-400 transition-colors text-sm" title="Baixar Tudo em PDF">📥</button>
            <button onclick="clearAllCanvasesInCard(this.closest('.codex-card'))" class="text-slate-300 hover:text-rose-400 transition-colors" title="Limpar Tudo">🗑️</button>
            
            <div class="w-px h-3 bg-slate-600"></div>
            <button onclick="toggleFullscreenCard(this.closest('.codex-card'))" class="fullscreen-toggle-btn text-slate-300 hover:text-amber-400 transition-colors font-bold text-xs" title="Tela Cheia">⛶</button>
          </div>
          
          <div class="scroll-container-a4 flex-1 w-full h-full overflow-y-auto bg-slate-100 dark:bg-slate-950/30 p-4 flex flex-col gap-6 justify-start items-center m-0 pointer-events-auto" onmousedown="event.stopPropagation();" ontouchstart="event.stopPropagation();">
            <div class="canvas-item-wrapper m-auto relative">
              <canvas id="${initialCanvasId}" class="drawing-canvas shadow-xl bg-white block touch-none" width="${config.canvasW}" height="${config.canvasH}" data-mode="pen" data-stroke-width="4" data-color="#1e293b" data-zoom="1" style="width: ${config.cssW}px; height: ${config.cssH}px;"></canvas>
            </div>
          </div>
        </div>
      `;

      const targetLeft = mouseXCanvas || (Math.abs(panX) / zoom + 350);
      const targetTop = mouseYCanvas || (Math.abs(panY) / zoom + 150);
      const props = { width: `${config.cardW}px`, height: `${config.cardH}px`, left: `${targetLeft}px`, top: `${targetTop}px` };

      const newCard = createCard('NOTAS', nomeFolha, bodyHtml, config.cardW, props);
      newCard.dataset.currentGlobalMode = "pen";
      newCard.dataset.currentGlobalStroke = "4";
      newCard.dataset.currentGlobalColor = "#1e293b";
      newCard.dataset.paperType = tipoPapel; // Salva o tipo no dataset do card

      const canvasEl = newCard.querySelector('.drawing-canvas');
      if (canvasEl) {
        canvasEl.classList.add('initialized');
        initDrawingCanvas(canvasEl);
      }
    }

    // Adiciona "páginas" dentro do mesmo bloco de anotações
    window.adicionarNovaPaginaAoCard = function(card) {
      if (!card) return;
      const scrollContainer = card.querySelector('.scroll-container-a4');
      if (!scrollContainer) return;

      const paperType = card.dataset.paperType || "A4";
      const config = paperConfigs[paperType] || paperConfigs['A4'];

      const newId = 'canvas_page_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
      const firstCanvas = card.querySelector('.drawing-canvas');
      const currentZoom = firstCanvas ? firstCanvas.dataset.zoom : "1";
      const currentMode = card.dataset.currentGlobalMode || "pen";
      const currentStroke = card.dataset.currentGlobalStroke || "4";
      const currentColor = card.dataset.currentGlobalColor || "#1e293b";

      const calculatedWidth = config.cssW * parseFloat(currentZoom);
      const calculatedHeight = config.cssH * parseFloat(currentZoom);

      const wrapper = document.createElement('div');
      wrapper.className = "canvas-item-wrapper m-auto relative";
      wrapper.innerHTML = `
        <button onclick="this.parentElement.remove(); salvarEstadoNoStorage();" class="absolute -top-2 -right-2 bg-rose-500 hover:bg-rose-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-[11px] font-bold shadow-lg z-10">&times;</button>
        <canvas id="${newId}" class="drawing-canvas shadow-xl bg-white block touch-none" width="${config.canvasW}" height="${config.canvasH}" data-mode="${currentMode}" data-stroke-width="${currentStroke}" data-color="${currentColor}" data-zoom="${currentZoom}" style="width: ${calculatedWidth}px; height: ${calculatedHeight}px;"></canvas>
      `;

      scrollContainer.appendChild(wrapper);
      const newCanvasEl = wrapper.querySelector('.drawing-canvas');
      initDrawingCanvas(newCanvasEl);
      salvarEstadoNoStorage();
    }

    // Aplica zoom internamente só na folha que está sendo desenhada
    window.zoomCanvasCard = function(card, delta) {
      if (!card) return;
      const paperType = card.dataset.paperType || "A4";
      const config = paperConfigs[paperType] || paperConfigs['A4'];
      
      const canvases = card.querySelectorAll('.drawing-canvas');
      canvases.forEach(canvasEl => {
        let currentZoom = parseFloat(canvasEl.dataset.zoom) || 1;
        currentZoom += delta;
        currentZoom = Math.max(0.4, Math.min(currentZoom, 3));
        canvasEl.dataset.zoom = currentZoom;

        canvasEl.style.width = `${config.cssW * currentZoom}px`;
        canvasEl.style.height = `${config.cssH * currentZoom}px`;
      });
      salvarEstadoNoStorage();
    }

    // Converte os desenhos Canvas em arquivo PDF para Download local
    window.downloadCardAsMultiPagePDF = function(card) {
      if (!card) return;
      const canvases = card.querySelectorAll('.drawing-canvas');
      if (canvases.length === 0) return;

      const paperType = card.dataset.paperType || "A4";
      let format = 'a4';
      let w = 210, h = 297, orientation = 'p';

      if (paperType === 'Carta') {
          format = 'letter';
          w = 215.9; h = 279.4;
      } else if (paperType === 'Quadro') {
          format = [400, 400]; // mm
          w = 400; h = 400;
      }

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF(orientation, 'mm', format);
      const filename = card.dataset.filename || 'nota-rascunho';

      canvases.forEach((canvasEl, index) => {
        if (index > 0) pdf.addPage(format, orientation);
        const imgData = canvasEl.toDataURL('image/jpeg', 1.0);
        pdf.addImage(imgData, 'JPEG', 0, 0, w, h);
      });

      pdf.save(`${filename}.pdf`);
    }

    // Define estado de (Desenhar, Apagar, Arrastar folha)
    window.setDrawMode = function(btn, mode) {
      const card = btn.closest('.codex-card');
      if (!card) return;
      card.dataset.currentGlobalMode = mode;
      
      const canvases = card.querySelectorAll('.drawing-canvas');
      canvases.forEach(c => c.dataset.mode = mode);

      // Limpa os estados visuais apenas dos botões de ferramenta (Caneta, Borracha, Mover)
      btn.parentElement.querySelectorAll('button').forEach(b => {
        if (b.title === 'Caneta' || b.title === 'Borracha' || b.title === 'Mover pela folha') {
          b.className = "p-1.5 rounded-lg opacity-60 hover:opacity-100 hover:bg-slate-700/50 transition-all";
        }
      });
      
      // Destaca visualmente o botão que acabou de ser clicado
      btn.className = "p-1.5 rounded-lg bg-amber-500/30 ring-1 ring-amber-400 opacity-100 shadow-md transition-all scale-110";

      const scrollContainer = card.querySelector('.scroll-container-a4');
      if (scrollContainer) {
        scrollContainer.style.cursor = mode === 'move' ? 'grab' : 'default';
      }
    }

    // Altera e propaga tamanho do pincel
    window.setStrokeWidthCard = function(card, value) {
      if (!card) return;
      card.dataset.currentGlobalStroke = value;
      const canvases = card.querySelectorAll('.drawing-canvas');
      canvases.forEach(c => c.dataset.strokeWidth = value);
    }
    
    // Altera e propaga cor do pincel
    window.setColorCard = function(card, value) {
      if (!card) return;
      card.dataset.currentGlobalColor = value;
      const canvases = card.querySelectorAll('.drawing-canvas');
      canvases.forEach(c => c.dataset.color = value);
    }

    window.clearAllCanvasesInCard = function(card) {
      if (!card) return;
      const canvases = card.querySelectorAll('.drawing-canvas');
      canvases.forEach(canvasEl => {
        const ctx = canvasEl.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);
        canvasEl.dataset.isDirty = "true"; // Sinaliza alteração para o salvamento
      });
      salvarEstadoNoStorage();
    }

    // Reconstrói todo o card de Notas após recarregar a página (com imagens do Base64)
    function reconstruirCardNotasComPaginas(c) {
      const paperType = c.paperType || "A4";
      const config = paperConfigs[paperType] || paperConfigs['A4'];
      
      const a4Width = c.width || `${config.cardW}px`;
      const a4Height = c.height || `${config.cardH}px`;
      const savedPages = c.pagesArray || [];
      const globalColor = c.globalColor || "#1e293b";

      let pagesContentHtml = "";
      savedPages.forEach((page, index) => {
        const currentZoom = parseFloat(page.zoom) || 1;
        const pageColor = page.color || globalColor;
        const calculatedWidth = config.cssW * currentZoom;
        const calculatedHeight = config.cssH * currentZoom;

        const deleteButton = index > 0 ? `<button onclick="this.parentElement.remove(); salvarEstadoNoStorage();" class="absolute -top-2 -right-2 bg-rose-500 hover:bg-rose-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-[11px] font-bold shadow-lg z-10">&times;</button>` : "";

        pagesContentHtml += `
          <div class="canvas-item-wrapper m-auto relative">
            ${deleteButton}
            <canvas id="${page.id}" class="drawing-canvas shadow-xl bg-white block touch-none" width="${config.canvasW}" height="${config.canvasH}" data-mode="pen" data-stroke-width="4" data-color="${pageColor}" data-zoom="${currentZoom}" style="width: ${calculatedWidth}px; height: ${calculatedHeight}px;"></canvas>
          </div>
        `;
      });

      const bodyHtml = `
        <div class="flex flex-col h-full bg-white relative select-none pointer-events-auto">
          <div class="flex-shrink-0 sticky top-0 left-0 w-full bg-slate-800/95 backdrop-blur text-white px-2 sm:px-3 py-1.5 flex flex-wrap gap-1.5 sm:gap-2.5 z-20 shadow-lg items-center justify-center text-xs" onmousedown="event.stopPropagation();" ontouchstart="event.stopPropagation();">
            <button onclick="setDrawMode(this, 'pen')" class="p-1.5 rounded-lg bg-amber-500/30 ring-1 ring-amber-400 opacity-100 shadow-md transition-all scale-110" title="Caneta">✏️</button>
            <button onclick="setDrawMode(this, 'eraser')" class="p-1.5 rounded-lg opacity-60 hover:opacity-100 hover:bg-slate-700/50 transition-all" title="Borracha">🧽</button>
            <button onclick="setDrawMode(this, 'move')" class="p-1.5 rounded-lg opacity-60 hover:opacity-100 hover:bg-slate-700/50 transition-all" title="Mover pela folha">🖐️</button>
            
            <div class="flex items-center gap-1 text-[11px] bg-slate-700/60 px-1.5 py-0.5 rounded-md">
              <span class="text-slate-400">px:</span>
              <input type="number" min="1" max="50" value="4" oninput="setStrokeWidthCard(this.closest('.codex-card'), this.value)" class="w-7 bg-transparent text-center text-amber-400 font-bold font-mono focus:outline-none pointer-events-auto">
            </div>
            
            <input type="color" value="${globalColor}" oninput="setColorCard(this.closest('.codex-card'), this.value)" class="w-6 h-6 ml-1 p-0 border-0 rounded bg-transparent cursor-pointer pointer-events-auto" title="Cor da Caneta">

            <div class="hidden sm:block w-px h-3 bg-slate-600"></div>
            
            <button onclick="adicionarNovaPaginaAoCard(this.closest('.codex-card'))" class="text-indigo-400 hover:text-indigo-300 transition-colors font-bold text-[11px] whitespace-nowrap" title="Adicionar outra folha">+📄</button>

            <div class="hidden sm:block w-px h-3 bg-slate-600"></div>

            <button onclick="zoomCanvasCard(this.closest('.codex-card'), 0.15)" class="text-slate-300 hover:text-amber-300 transition-colors font-bold text-xs" title="Aumentar Zoom">➕</button>
            <button onclick="zoomCanvasCard(this.closest('.codex-card'), -0.15)" class="text-slate-300 hover:text-amber-300 transition-colors font-bold text-xs" title="Diminuir Zoom">➖</button>
            
            <div class="hidden sm:block w-px h-3 bg-slate-600"></div>

            <button onclick="downloadCardAsMultiPagePDF(this.closest('.codex-card'))" class="text-slate-300 hover:text-emerald-400 transition-colors text-sm" title="Baixar Tudo em PDF">📥</button>
            <button onclick="clearAllCanvasesInCard(this.closest('.codex-card'))" class="text-slate-300 hover:text-rose-400 transition-colors" title="Limpar Tudo">🗑️</button>
            
            <div class="hidden sm:block w-px h-3 bg-slate-600"></div>
            <button onclick="toggleFullscreenCard(this.closest('.codex-card'))" class="fullscreen-toggle-btn text-slate-300 hover:text-amber-400 transition-colors font-bold text-xs" title="Tela Cheia">⛶</button>
          </div>
          
          <div class="scroll-container-a4 flex-1 w-full overflow-y-auto bg-slate-100 dark:bg-slate-950/30 p-4 flex flex-col gap-6 justify-start items-center m-0 pointer-events-auto" onmousedown="event.stopPropagation();" ontouchstart="event.stopPropagation();">
            ${pagesContentHtml}
          </div>
        </div>
      `;

      const newCard = createCard('NOTAS', c.filename, bodyHtml, parseFloat(a4Width), {
        width: a4Width, height: a4Height, left: c.left, top: c.top, groupId: c.groupId
      });
      newCard.dataset.currentGlobalMode = "pen";
      newCard.dataset.currentGlobalStroke = "4";
      newCard.dataset.currentGlobalColor = globalColor;
      newCard.dataset.paperType = paperType; // Resgata o tipo de papel do save

      savedPages.forEach(p => {
        const canvasEl = newCard.querySelector(`#${p.id}`);
        if (canvasEl) {
          canvasEl.classList.add('initialized');
          canvasEl.dataset.cachedData = p.data; // Armazena a imagem carregada no cache inicial do elemento
          initDrawingCanvas(canvasEl, p.data); // Recarrega imagem do Storage na tela
        }
      });
    }

    // INICIALIZAÇÃO DE CANETAS DO CANVAS DE NOTAS (O coração dos rabiscos)
    window.initDrawingCanvas = function(canvasEl, savedDataUrl = null) {
      if (!canvasEl) return;
      const ctx = canvasEl.getContext('2d');
      
      // Ativa suavização para evitar pixelamento
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      
      // O fundo precisa ser preenchido de branco para o JSpdf ler depois
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);

      if (savedDataUrl) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = savedDataUrl;
      }

      let isDrawing = false;
      let isMoving = false;
      let isTwoFingerScrolling = false;
      let lastTwoFingerCenter = { x: 0, y: 0 };
      let lastX = 0; let lastY = 0;
      let lastClientX = 0; let lastClientY = 0;
      let saveTimeout = null;

      // --- Variável para travar no toque correto e ignorar a palma ---
      let activeTouchId = null;

      // Pega a posição usando coordenadas X e Y explícitas
      function getPos(clientX, clientY) {
        const rect = canvasEl.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (canvasEl.width / rect.width),
          y: (clientY - rect.top) * (canvasEl.height / rect.height)
        };
      }

      // Filtro Inteligente de Toque para precaver toques acidentais
      function getValidTouch(touches) {
        // 1. Prioriza a caneta (stylus) se estiver em uso
        for (let i = 0; i < touches.length; i++) {
          if (touches[i].touchType === 'stylus') return touches[i];
        }
        // 2. Se for dedo, procura um toque que NÃO seja muito largo (rejeição de palma)
        for (let i = 0; i < touches.length; i++) {
          if (touches[i].radiusX === undefined || touches[i].radiusX < 20) {
            return touches[i];
          }
        }
        return null; // Se for muito grande, assume que é palma encostada
      }

      function start(e) {
        if (typeof forcePanMode !== 'undefined' && forcePanMode) return;
        
        // NOVO: Se o usuário tocar com 2 dedos, ativa o modo de rolagem automática das Notas
        if (e.touches && e.touches.length === 2) {
          isDrawing = false;
          isMoving = false;
          isTwoFingerScrolling = true;
          const t1 = e.touches[0];
          const t2 = e.touches[1];
          lastTwoFingerCenter = {
            x: (t1.clientX + t2.clientX) / 2,
            y: (t1.clientY + t2.clientY) / 2
          };
          e.preventDefault();
          if (e.stopPropagation) e.stopPropagation();
          return;
        }

        isTwoFingerScrolling = false;
        let clientX, clientY;

        if (e.touches) {
          const validTouch = getValidTouch(e.touches);
          if (!validTouch) return; // Bloqueou a palma
          
          activeTouchId = validTouch.identifier; // Trava O ID deste dedo/caneta
          clientX = validTouch.clientX;
          clientY = validTouch.clientY;
        } else {
          if (e.button !== 0) return; // Ignora clique direito no mouse
          clientX = e.clientX;
          clientY = e.clientY;
        }

        e.preventDefault(); 

        const mode = canvasEl.dataset.mode;
        
        if (mode === 'move') {
          isMoving = true;
          lastClientX = clientX;
          lastClientY = clientY;
          if (e.stopPropagation) e.stopPropagation();
          return;
        }
        
        isDrawing = true;
        canvasEl.dataset.isDirty = "true"; 
        const pos = getPos(clientX, clientY);
        lastX = pos.x; lastY = pos.y;
        
        const strokeW = parseFloat(canvasEl.dataset.strokeWidth) || 4;
        const color = canvasEl.dataset.color || '#1e293b';

        ctx.beginPath();
        ctx.arc(pos.x, pos.y, mode === 'eraser' ? (strokeW * 6) / 2 : strokeW / 2, 0, 2 * Math.PI);
        ctx.fillStyle = mode === 'eraser' ? '#ffffff' : color;
        ctx.fill();
        if (e.stopPropagation) e.stopPropagation();
      }

      function draw(e) {
        // NOVO: Processa a rolagem por duas vias se houver exatamente dois dedos sobre a folha
        if (e.touches && e.touches.length === 2 && isTwoFingerScrolling) {
          e.preventDefault();
          if (e.stopPropagation) e.stopPropagation();
          const t1 = e.touches[0];
          const t2 = e.touches[1];
          const currentCenter = {
            x: (t1.clientX + t2.clientX) / 2,
            y: (t1.clientY + t2.clientY) / 2
          };
          const dx = currentCenter.x - lastTwoFingerCenter.x;
          const dy = currentCenter.y - lastTwoFingerCenter.y;
          
          const scrollContainer = canvasEl.closest('.scroll-container-a4');
          if (scrollContainer) {
            scrollContainer.scrollLeft -= dx;
            scrollContainer.scrollTop -= dy;
          }
          lastTwoFingerCenter = currentCenter;
          return;
        }

        let clientX, clientY;

        if (e.touches) {
          // Procura o toque exato que iniciou a ação, ignorando palmas/outros dedos novos
          let currentTouch = null;
          for (let i = 0; i < e.touches.length; i++) {
            if (e.touches[i].identifier === activeTouchId) {
              currentTouch = e.touches[i];
              break;
            }
          }
          if (!currentTouch) return; // O dedo original ou caneta não está mais tocando na tela
          
          clientX = currentTouch.clientX;
          clientY = currentTouch.clientY;
        } else {
          clientX = e.clientX;
          clientY = e.clientY;
        }

        const mode = canvasEl.dataset.mode;
        
        if (mode === 'move') {
          if (!isMoving) return;
          e.preventDefault();
          if (e.stopPropagation) e.stopPropagation();

          const deltaX = clientX - lastClientX;
          const deltaY = clientY - lastClientY;
          lastClientX = clientX;
          lastClientY = clientY;

          const scrollContainer = canvasEl.closest('.scroll-container-a4');
          if (scrollContainer) {
            scrollContainer.scrollLeft -= deltaX;
            scrollContainer.scrollTop -= deltaY;
          }
          return;
        }

        if (!isDrawing) return;
        e.preventDefault();
        if (e.stopPropagation) e.stopPropagation();
        
        const pos = getPos(clientX, clientY);
        const strokeW = parseFloat(canvasEl.dataset.strokeWidth) || 4;
        const color = canvasEl.dataset.color || '#1e293b';

        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        if (mode === 'eraser') {
          ctx.globalCompositeOperation = 'source-over';
          ctx.lineWidth = strokeW * 6;
          ctx.strokeStyle = '#ffffff';
        } else {
          ctx.globalCompositeOperation = 'source-over';
          ctx.lineWidth = strokeW;
          ctx.strokeStyle = color; 
        }

        ctx.stroke();
        lastX = pos.x; lastY = pos.y;
      }

      function stop(e) {
        if (isTwoFingerScrolling) {
          isTwoFingerScrolling = false;
          activeTouchId = null;
          return;
        }

        // Se for toque, verifica se quem levantou foi o dedo principal
        if (e && e.changedTouches) {
          let activeLifted = false;
          for (let i = 0; i < e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === activeTouchId) {
              activeLifted = true;
              break;
            }
          }
          if (!activeLifted && (isDrawing || isMoving)) return; 
        }

        activeTouchId = null;

        if (isDrawing) {
          isDrawing = false;
          if (saveTimeout) clearTimeout(saveTimeout);
          saveTimeout = setTimeout(() => {
            salvarEstadoNoStorage(); 
          }, 3000);
        }
        isMoving = false;
      }

      canvasEl.addEventListener('mousedown', start);
      canvasEl.addEventListener('mousemove', draw);
      window.addEventListener('mouseup', stop);
      canvasEl.addEventListener('touchstart', start, { passive: false });
      canvasEl.addEventListener('touchmove', draw, { passive: false });
      window.addEventListener('touchend', stop);
      window.addEventListener('touchcancel', stop);
    }
  </script>
